<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Portfolio — CoinCraze</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <img id="logo" src="logo.jpeg">
    <div class="nav-logo"></span></div>
    <div class="nav-links">
      <a href="index.html">🏠 Home</a>
      <a href="portfolio.html">💼 Portfolio</a>
      <a href="news.html">📰 News</a>
    </div>
    <div class="currency-toggle">
      <button id="usd-btn" onclick="setCurrency('usd')">$ USD</button>
      <button id="inr-btn" onclick="setCurrency('inr')">₹ INR</button>
    </div>
  </nav>

  <!-- PORTFOLIO -->
  <div class="portfolio-wrap">

    <div class="portfolio-top">
      <h1>💼 My Portfolio</h1>
      <button class="clear-btn" onclick="clearPortfolio()">🗑️ Clear All</button>
    </div>

    <!-- Summary -->
    <div class="p-summary">
      <div class="stat-card">
        <div class="stat-label">Total Value</div>
        <div class="stat-value" id="portfolio-total">—</div>
        <div class="stat-sub">At current prices</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Holdings</div>
        <div class="stat-value" id="portfolio-count">—</div>
        <div class="stat-sub">Different coins</div>
      </div>
    </div>

    <!-- Chart + Table -->
    <div class="p-chart-row">

      <!-- Doughnut chart -->
      <div class="chart-card">
        <h3>📊 Portfolio Breakdown</h3>
        <div class="chart-wrap">
          <canvas id="portfolioChart"></canvas>
        </div>
      </div>

      <!-- Holdings table -->
      <div class="p-table-card">
        <div class="p-table-head">
          <span>Coin</span>
          <span>Qty</span>
          <span>Buy Price</span>
          <span>Value</span>
          <span>Action</span>
        </div>
        <!-- Portfolio rows added by JS -->
        <div id="portfolio-list"></div>
      </div>

    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <p>CoinCraze — HTML, CSS & JavaScript | Data by <span>CoinGecko API</span></p>
  </footer>
<script>
    const starCount = 100; // Adjust this number for more or fewer stars

    for (let i = 0; i < starCount; i++) {
      const star = document.createElement('div');
      star.className = 'star';

      // Randomize sizes between 1px and 3px
      const size = Math.random() * 3 + 1;
      star.style.width = `${size}px`;
      star.style.height = `${size}px`;

      // Randomize positioning across the screen
      star.style.left = `${Math.random() * 100}vw`;
      star.style.top = `${Math.random() * 100}vh`;

      // Randomize twinkle speeds and delays
      star.style.animationDuration = `${Math.random() * 3 + 1}s`;
      star.style.animationDelay = `${Math.random() * 2}s`;

      document.body.appendChild(star);
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>
</body>
</html>
